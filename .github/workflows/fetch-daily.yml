name: Fetch oil_daily.pdf

# 経産省 oil_daily.pdf を毎日取得し、data/snapshots.json を更新する。
# 失敗時は何もコミットせず、Actions のログ + 通知で人間に戻す。

on:
  schedule:
    # 22:00 UTC = 07:00 JST. 経産省の更新タイミングを考慮して JST 朝に走らせる。
    # 必要なら複数本立てる（例: '0 22,1 * * *' で2回試行）。
    - cron: '0 22 * * *'
  workflow_dispatch: {}     # 手動トリガ可

concurrency:
  group: fetch-daily
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write       # 自身でコミット&プッシュするため
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch and parse PDF
        run: python scripts/fetch_pdf.py

      - name: Commit if changed
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if [[ -n "$(git status --porcelain data/snapshots.json)" ]]; then
            git add data/snapshots.json
            git commit -m "data: auto-update $(date -u +%Y-%m-%d)"
            git push
            echo "::notice::snapshots.json updated and pushed"
          else
            echo "::notice::No changes; PDF was identical to existing data"
          fi
