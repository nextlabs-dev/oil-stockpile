name: Tests

# scripts/fetch_pdf.py のロジックをテストする。
# fetch-daily.yml の自動取得が壊れる前に、パーサ修正の影響を CI で検出する。
# 加えて、src/ 編集時に build_site.py の生成物が drift していないかも検証する。

on:
  push:
    paths:
      - 'scripts/**'
      - 'src/**'
      - 'assets/**'
      - 'js/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'src/**'
      - 'assets/**'
      - 'js/**'
      - '.github/workflows/test.yml'
  workflow_dispatch: {}

# テスト実行と生成物 drift の git diff チェックのみで、commit/push はしないため読み取り権限のみ。
permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # generate_ogp の RenderSmokeTest が CJK フォントを必須とするため、
      # fetch-daily.yml と同様に CI にも導入する。
      - name: Install CJK fonts (for OGP render test)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-noto-cjk

      - name: Run unit tests
        run: python -m unittest discover -s scripts -p 'test_*.py' -v

      - name: Verify generated HTML is in sync with src/
        run: |
          python scripts/build_site.py
          if ! git diff --exit-code -- index.html tankers/index.html scale/index.html about/index.html; then
            echo "::error::Generated HTML is out of date. Run 'python scripts/build_site.py' locally and commit the result."
            exit 1
          fi

  # js/ の純ロジック（escapeHtml / カウンター計算 / グラフ算術）を node:test で検証する。
  js-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0 # CI では git hook を入れない

      - name: Run JS unit tests
        run: npm test
