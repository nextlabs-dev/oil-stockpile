name: Tests

# scripts/fetch_pdf.py のロジックをテストする。
# fetch-daily.yml の自動取得が壊れる前に、パーサ修正の影響を CI で検出する。
# 加えて、src/ 編集時に build_site.py の生成物が drift していないかも検証する。

on:
  push:
    paths:
      - 'scripts/**'
      - 'src/**'
      - 'assets/**'
      - 'js/**'
      - 'workers/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'src/**'
      - 'assets/**'
      - 'js/**'
      - 'workers/**'
      - '.github/workflows/test.yml'
  workflow_dispatch: {}

# テスト実行と生成物 drift の git diff チェックのみで、commit/push はしないため読み取り権限のみ。
permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # generate_ogp の RenderSmokeTest が CJK フォントを必須とするため、
      # fetch-daily.yml と同様に CI にも導入する。
      - name: Install CJK fonts (for OGP render test)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-noto-cjk

      - name: Run unit tests
        run: python -m unittest discover -s scripts -p 'test_*.py' -v

      - name: Verify generated HTML is in sync with src/
        run: |
          python scripts/build_site.py
          # 生成ページ一覧は src/site.json の pages[].output を SSOT とし、
          # ここでハードコードしない（fetch-daily.yml と重複させない）。
          mapfile -t pages < <(python -c "import json;print('\n'.join(p['output'] for p in json.load(open('src/site.json', encoding='utf-8'))['pages']))")
          if [[ ${#pages[@]} -eq 0 ]]; then
            echo "::error::No pages derived from src/site.json"
            exit 1
          fi
          # intent-to-add で新規未追跡の生成 HTML も diff 対象に含める。
          # ページ追加時に生成物のコミットを忘れても検知できるようにする
          # （git diff は通常、未追跡ファイルを無視するため）。
          git add --intent-to-add -- "${pages[@]}"
          if ! git diff --exit-code -- "${pages[@]}"; then
            echo "::error::Generated HTML is out of date. Run 'python scripts/build_site.py' locally and commit the result."
            exit 1
          fi

  # js/ の純ロジック（escapeHtml / カウンター計算 / グラフ算術）を node:test で検証する。
  js-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0 # CI では git hook を入れない

      - name: Run JS unit tests
        run: npm test
