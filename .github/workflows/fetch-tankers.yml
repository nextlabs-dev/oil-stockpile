name: Fetch tanker AIS data

# aisstream.io から日本周辺のタンカー情報を定期取得して
# data/tankers.json を更新する。
#
# 必要な GitHub Secret:
#   AISSTREAM_API_KEY  — https://aisstream.io/ で取得（無料）

on:
  schedule:
    # 1時間ごと。GitHub Actions は毎時0分が混みやすいため 17分にずらす。
    - cron: '17 * * * *'
  workflow_dispatch: {}

concurrency:
  group: fetch-tankers
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sample AIS stream
        # aisstream.io は BETA で SLA 非保証。上流の一時障害で run 全体が赤くなるのを
        # 避けるため continue-on-error にする。失敗時は tankers.json を書かないため、次の
        # Commit if changed は no-op で抜ける。鍵失効や持続障害でグリーンのまま凍結する
        # ケースは、末尾の 'Guard against stale data' が fetchedAt 鮮度で検出して赤くする。
        continue-on-error: true
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: python scripts/fetch_tankers.py --duration 480

      - name: Commit if changed
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if [[ -n "$(git status --porcelain data/tankers.json)" ]]; then
            sampled="$(mktemp)"
            cp data/tankers.json "$sampled"

            for attempt in 1 2 3; do
              git fetch origin main
              git reset --hard origin/main
              cp "$sampled" data/tankers.json

              git add data/tankers.json
              git commit -m "data: tankers snapshot $(date -u +%Y-%m-%dT%H:%MZ)"

              if git push; then
                echo "::notice::tankers.json updated and pushed"
                exit 0
              fi

              echo "::warning::push failed on attempt ${attempt}; retrying on latest main"
              sleep 2
            done

            echo "::error::failed to push tanker snapshot after retries"
            exit 1
          else
            echo "::notice::No tankers.json update to commit; AIS sampling wrote nothing (see 'Sample AIS stream' annotations)"
          fi

      - name: Guard against stale data
        # continue-on-error なしの独立ステップ。'Sample AIS stream' の continue-on-error が
        # 鍵失効・aisstream の持続障害を握りつぶしてもジョブがグリーンのままになるのを防ぐ。
        # tankers.json の fetchedAt が 6h より古ければ（毎時実行なので約6回連続失敗に相当）
        # 持続的にデータが凍結しているとみなし、ジョブを赤くして保守者に通知する。
        run: python scripts/check_tankers_fresh.py --max-age-hours 6
