name: Fetch tanker AIS data

# aisstream.io から日本周辺のタンカー情報を定期取得して
# data/tankers.json を更新する。
#
# 必要な GitHub Secret:
#   AISSTREAM_API_KEY  — https://aisstream.io/ で取得（無料）

on:
  schedule:
    # 1時間ごと。GitHub Actions は毎時0分が混みやすいため 17分にずらす。
    - cron: '17 * * * *'
  workflow_dispatch: {}

concurrency:
  group: fetch-tankers
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sample AIS stream
        # aisstream.io は BETA で SLA 非保証。上流障害で run 全体が赤くなるのを避ける。
        # 失敗時は tankers.json を書かないため、次の Commit if changed は no-op で抜ける。
        continue-on-error: true
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: python scripts/fetch_tankers.py --duration 480

      - name: Commit if changed
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if [[ -n "$(git status --porcelain data/tankers.json)" ]]; then
            sampled="$(mktemp)"
            cp data/tankers.json "$sampled"

            for attempt in 1 2 3; do
              git fetch origin main
              git reset --hard origin/main
              cp "$sampled" data/tankers.json

              if [[ -z "$(git status --porcelain data/tankers.json)" ]]; then
                echo "::notice::No changes after refreshing main; tanker counts identical to latest data"
                exit 0
              fi

              git add data/tankers.json
              git commit -m "data: tankers snapshot $(date -u +%Y-%m-%dT%H:%MZ)"

              if git push; then
                echo "::notice::tankers.json updated and pushed"
                exit 0
              fi

              echo "::warning::push failed on attempt ${attempt}; retrying on latest main"
              sleep 2
            done

            echo "::error::failed to push tanker snapshot after retries"
            exit 1
          else
            echo "::notice::No changes; tanker counts identical to existing data"
          fi
