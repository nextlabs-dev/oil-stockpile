name: Lint

# Biome (JS/CSS/JSON/MD) と Ruff (Python) を CI で強制する。
# ローカルの pre-commit はバイパス (--no-verify)・husky 未インストールのクローン・
# GitHub Web 編集で擦り抜けるため、中央でも整形と lint を担保する。
# Ruff は無人で回る scripts/ (fetch-daily.yml) の静的解析を担保するのが主目的。
# data/ 配下の自動スナップショット commit では走らせない (Biome 側も data を除外済み)。

on:
  push:
    paths:
      - '**/*.js'
      - '**/*.css'
      - '**/*.md'
      - '**/*.json'
      - '**/*.py'
      - 'ruff.toml'
      - '!data/**'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - '**/*.js'
      - '**/*.css'
      - '**/*.md'
      - '**/*.json'
      - '**/*.py'
      - 'ruff.toml'
      - '!data/**'
      - '.github/workflows/lint.yml'
  workflow_dispatch: {}

# checkout して biome check するだけで、書き込みは一切しないため読み取り権限のみ。
permissions:
  contents: read

jobs:
  biome:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0 # CI では git hook を入れない

      - name: Run Biome check (format + lint)
        run: npm run check

  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      # ruff はバージョン間で lint ルールが増えるため、CI 破壊を避けて固定する。
      # 更新は手動 (ローカルの ruff も同バージョンに揃える)。
      - name: Install Ruff
        run: pip install ruff==0.15.20

      - name: Run Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .
