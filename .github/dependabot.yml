# GitHub Actions と npm(dev依存) のバージョン更新を Dependabot に任せる。
# pip(scripts/requirements.txt) は >= 指定で CI が毎回最新を取得するため
# version-update からは外し、Settings の Dependabot security alerts に委ねる。
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      dev-deps:
        patterns: ["*"]
