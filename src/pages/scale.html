<main id="main" class="site-main scale-layout">

  <!-- Hero card -->
  <section class="scale-hero-card" aria-labelledby="scale-heading">
    <span class="scale-eyebrow">経産省 最新速報値・<span id="scale-as-of">—</span>時点</span>
    <h1 id="scale-heading" class="scale-hero-title">石油ものさし</h1>
    <p class="scale-hero-lead">
      <strong><span id="scale-days">—</span>日分</strong>を、容量・スケール・豆知識の3つの視点から体感できる形に変換します。
    </p>
    <p id="scale-stale-warning" class="stale-warning" hidden>
      ⚠ 経済産業省データの取得から2週間以上経過しています。自動取得が止まっている可能性があります。
    </p>
  </section>

  <!-- 2x2 metric grid -->
  <div class="scale-grid">

    <!-- 容量: バレル -->
    <section class="scale-card" aria-labelledby="card-barrels-label">
      <span id="card-barrels-label" class="scale-card-label">バレル</span>
      <div class="scale-card-value">
        <span id="unit-barrels" class="scale-card-num">—</span>
        <span class="scale-card-suffix">Barrel</span>
      </div>
    </section>

    <!-- 容量: リットル -->
    <section class="scale-card" aria-labelledby="card-liters-label">
      <span id="card-liters-label" class="scale-card-label">リットル</span>
      <div class="scale-card-value">
        <span id="unit-liters" class="scale-card-num">—</span>
        <span class="scale-card-suffix">L</span>
      </div>
    </section>

    <!-- スケール: VLCC -->
    <section class="scale-card scale-card--with-inner" aria-labelledby="card-vlcc-label">
      <span id="card-vlcc-label" class="scale-card-title">VLCCタンカー何隻分？</span>
      <div class="scale-inner">
        <div class="scale-card-value">
          <span id="compare-vlcc-prefix" class="scale-card-prefix">約</span>
          <span id="compare-vlcc" class="scale-card-num">—</span>
          <span class="scale-card-suffix">隻</span>
        </div>
      </div>
      <p class="scale-card-meta">
        超大型原油タンカー 1 隻を約 30 万 kL として換算。東京湾に並ぶイメージ。
      </p>
    </section>

    <!-- スケール: お風呂 -->
    <section class="scale-card scale-card--with-inner" aria-labelledby="card-bath-label">
      <span id="card-bath-label" class="scale-card-title">お風呂何杯分？</span>
      <div class="scale-inner">
        <div class="scale-card-value">
          <span class="scale-card-prefix">約</span>
          <span id="compare-bath" class="scale-card-num">—</span>
          <span id="compare-bath-suffix" class="scale-card-suffix">杯</span>
        </div>
      </div>
      <p class="scale-card-meta">
        家庭用お風呂 1 杯を約 300 L として換算。全国民が毎日入り続けて 約 <span id="compare-bath-years">—</span> 日分に相当。
      </p>
    </section>

  </div>

</main>
